name: zahter_kiraathane
description: "zahter sunar."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  flutter_webrtc: ^1.5.2
  permission_handler: ^12.0.3
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_foreground: "assets/icon/foreground_icon.png" # Web sitesinden indirdiğiniz görsel
  adaptive_icon_background: "#000000" # İstediğiniz arka plan rengi veya başka bir görsel
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_icon.png
    - assets/icon/foreground_icon.png